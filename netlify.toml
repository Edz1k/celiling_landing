[build]
publish = "dist"
command = "pnpm run build"

[functions]
directory = "netlify/functions"

[build.environment]
NODE_VERSION = "22"

[[redirects]]
from = "/api/telegram-lead"
to = "/.netlify/functions/send-telegram-lead"
status = 200
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/manifest.webmanifest"

[headers.values]
Content-Type = "application/manifest+json"
